<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>National Ethics Review Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0f172a; min-height: 100vh; }
  .nav { background: linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%); height: 64px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 24px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 50; }
  .nav-logo { width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0; }
  .nav-title { font-size:15px;font-weight:700;color:#fff; }
  .nav-sub { font-size:11px;color:rgba(255,255,255,0.65); }
  .btn-login { background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.35);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }
  .btn-login:hover { background:rgba(255,255,255,0.25); }
  .admin-badge { display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px;border:1px solid rgba(255,255,255,0.3); }
  .admin-dot { width:24px;height:24px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff; }
  .btn-logout { background:rgba(239,68,68,0.25);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit; }
  .body { display:flex; min-height: calc(100vh - 64px); }
  .sidebar { width:220px;background:#1e293b;border-right:1px solid #334155;padding:24px 0;flex-shrink:0; }
  .sidebar-label { padding:0 16px 16px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.1em; }
  .nav-btn { display:flex;align-items:center;gap:10px;width:100%;padding:11px 16px;font-size:13px;font-weight:400;color:#94a3b8;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.15s;position:relative; }
  .nav-btn:hover { color:#cbd5e1; }
  .nav-btn.active { font-weight:600;color:#fff;background:rgba(37,99,235,0.25);border-left:3px solid #3b82f6; }
  .nav-badge { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#ef4444;color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:2px 7px;min-width:18px;text-align:center; }
  .sidebar-stats { margin:24px 16px 0;padding:16px;background:#0f172a;border-radius:10px;border:1px solid #334155; }
  .stats-title { font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px; }
  .stat-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
  .stat-label { font-size:12px;color:#64748b; }
  .stat-val { font-size:14px;font-weight:700; }
  .sync-box { margin:12px 16px 0;padding:10px 12px;background:#0f172a;border-radius:8px;border:1px solid #1e3a5a; }
  .content { flex:1;padding:28px 32px;overflow-y:auto;background:#f1f5f9; }
  .metrics { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px; }
  .metric-card { border:1px solid #e2e8f0;border-radius:14px;padding:16px 18px; }
  .metric-card-inner { display:flex;justify-content:space-between;align-items:flex-start; }
  .metric-label { font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px; }
  .metric-val { font-size:30px;font-weight:800;line-height:1; }
  .section-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:18px; }
  .section-title { font-size:18px;font-weight:700;color:#0f172a; }
  .case-count { font-size:12px;color:#64748b;background:#e2e8f0;border-radius:20px;padding:3px 12px; }
  .empty-state { text-align:center;padding:60px 0;color:#94a3b8; }
  .case-card { background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.2s; }
  .case-card.open { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
  .case-header { display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer; }
  .case-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
  .case-title-text { font-size:14px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .case-meta { font-size:12px;color:#94a3b8;margin-top:2px; }
  .status-badge { font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0; }
  .chevron { color:#94a3b8;font-size:16px;flex-shrink:0;transition:transform 0.2s; }
  .chevron.open { transform:rotate(180deg); }
  .case-body { border-top:1px solid #f1f5f9; }

  /* Case inner tabs */
  .case-tabs { display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;padding:0 18px; }
  .case-tab { padding:10px 14px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap; }
  .case-tab.active { color:#2563eb;border-bottom-color:#2563eb; }
  .case-tab:hover:not(.active) { color:#334155; }
  .case-tab-body { padding:16px 18px 18px; }

  .board-notes { background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:16px;display:flex;gap:8px; }
  .timeline-label { font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px; }
  .timeline { position:relative;padding-left:20px; }
  .timeline-line { position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:#e2e8f0;border-radius:2px; }
  .timeline-item { display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;position:relative; }
  .timeline-dot { width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:1px;position:absolute;left:-20px; }
  .timeline-dot.current { background:#2563eb;border:3px solid #bfdbfe; }
  .timeline-dot.past { background:#cbd5e1;border:2px solid #e2e8f0; }
  .timeline-status { font-size:13px; }
  .timeline-status.current { font-weight:600;color:#1e293b; }
  .timeline-status.past { font-weight:400;color:#64748b; }
  .timeline-date { font-size:11px;color:#94a3b8;margin-top:1px; }
  .update-box { background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:10px; }
  .update-label { font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px; }
  .status-select { width:100%;font-size:13px;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;color:#334155;background:#fff;cursor:pointer;font-family:inherit;outline:none; }
  .btn-delete { font-size:12px;color:#ef4444;background:none;border:1px solid #fca5a5;border-radius:7px;padding:5px 12px;cursor:pointer;font-family:inherit; }
  .btn-delete:hover { background:#fef2f2; }
  .form-wrap { max-width:560px; }
  .form-title { font-size:18px;font-weight:700;color:#0f172a;margin:0 0 6px; }
  .form-sub { font-size:13px;color:#64748b;margin-bottom:24px; }
  .form-card { background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.05); }
  .form-label { display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px; }
  .form-input { width:100%;font-size:13px;font-family:inherit;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 14px;color:#1e293b;outline:none;background:#fff;transition:border-color 0.2s; }
  .form-input:focus { border-color:#93c5fd; }
  .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px; }
  .info-box { background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:12px;color:#1e40af;margin-bottom:20px; }
  .btn-submit { width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit; }
  .btn-submit:hover { opacity:0.92; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px; }
  .modal { background:#fff;border-radius:18px;padding:28px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,0.3); }
  .modal-header { display:flex;align-items:center;gap:10px;margin-bottom:20px; }
  .modal-icon { width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0; }
  .modal-title { font-size:16px;font-weight:700;color:#0f172a; }
  .modal-sub { font-size:12px;color:#94a3b8; }
  .modal-row { display:flex;gap:10px;margin-top:16px; }
  .btn-primary { flex:1;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit; }
  .btn-primary:hover { opacity:0.92; }
  .btn-secondary { background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit; }
  .btn-secondary:hover { background:#e2e8f0; }
  .warn-box { background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:16px; }
  textarea.form-input { resize:vertical;line-height:1.6; }
  .loading-screen { display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 64px);color:#94a3b8;gap:16px; }
  .spinner { width:40px;height:40px;border:3px solid #334155;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;border:1px solid #334155; }
  .toast.show { opacity:1; }

  /* ── Messaging ── */
  .msg-section-label { font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px; }
  .msg-unread-dot { width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .msg-thread { display:flex;flex-direction:column;gap:8px;margin-bottom:12px; }
  .msg-bubble { border-radius:12px;padding:10px 14px;max-width:88%;font-size:13px;line-height:1.55;word-break:break-word; }
  .msg-bubble.researcher { background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;align-self:flex-start;border-bottom-left-radius:4px; }
  .msg-bubble.admin { background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d;align-self:flex-end;border-bottom-right-radius:4px; }
  .msg-meta { font-size:10px;color:#94a3b8;margin-top:4px; }
  .msg-meta.right { text-align:right; }
  .msg-compose { background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px; }
  .msg-compose-label { font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px; }
  .msg-textarea { width:100%;font-size:13px;font-family:inherit;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;color:#1e293b;outline:none;background:#fff;resize:vertical;min-height:70px;line-height:1.55;transition:border-color 0.2s; }
  .msg-textarea:focus { border-color:#93c5fd; }
  .btn-send { background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px; }
  .btn-send:hover { opacity:0.9; }
  .msg-eligible-note { background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:12px;color:#854d0e; }
  .msg-empty { font-size:12px;color:#94a3b8;font-style:italic;padding:4px 0 8px; }
  .msg-sent-confirm { background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 14px;font-size:13px;color:#15803d;margin-bottom:10px; }

  /* ── Inbox tab ── */
  .inbox-wrap { max-width:700px; }
  .inbox-card { background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.2s; }
  .inbox-card.open { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
  .inbox-card-header { display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;border-left:4px solid #93c5fd; }
  .inbox-card-header.unread { border-left-color:#ef4444; }
  .inbox-case-title { font-size:13px;font-weight:700;color:#0f172a;margin-bottom:2px; }
  .inbox-case-meta { font-size:11px;color:#94a3b8;margin-top:2px; }
  .inbox-unread-badge { background:#ef4444;color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;flex-shrink:0; }
  .inbox-body { border-top:1px solid #f1f5f9;padding:16px 18px; }
  .inbox-thread { display:flex;flex-direction:column;gap:8px;margin-bottom:14px; }
  .inbox-reply-label { font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px; }

  /* ── Evaluation tab ── */
  .eval-section { margin-bottom:20px; }
  .eval-section-title { font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:6px; }
  .eval-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px; }
  .eval-field { display:flex;flex-direction:column;gap:4px; }
  .eval-label { font-size:11px;font-weight:600;color:#374151; }
  .eval-select, .eval-input { font-size:13px;font-family:inherit;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;color:#1e293b;outline:none;background:#fff;transition:border-color 0.2s;width:100%; }
  .eval-select:focus, .eval-input:focus { border-color:#93c5fd; }
  .eval-textarea { font-size:13px;font-family:inherit;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;color:#1e293b;outline:none;background:#fff;resize:vertical;line-height:1.55;transition:border-color 0.2s;width:100%; }
  .eval-textarea:focus { border-color:#93c5fd; }
  .rating-row { display:flex;gap:6px;flex-wrap:wrap; }
  .rating-btn { padding:5px 13px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#64748b;transition:all 0.15s; }
  .rating-btn.sel-1,.rating-btn.sel-2 { background:#fee2e2;border-color:#fca5a5;color:#b91c1c; }
  .rating-btn.sel-3 { background:#fef3c7;border-color:#fcd34d;color:#92400e; }
  .rating-btn.sel-4,.rating-btn.sel-5 { background:#dcfce7;border-color:#86efac;color:#15803d; }
  .eval-score-display { display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:12px;padding:14px 18px;margin-bottom:16px;color:#fff; }
  .eval-score-num { font-size:32px;font-weight:800;line-height:1; }
  .eval-score-label { font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px; }
  .eval-score-verdict { font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3); }
  .eval-checklist { display:flex;flex-direction:column;gap:6px; }
  .eval-check-item { display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:background 0.15s; }
  .eval-check-item:hover { background:#f1f5f9; }
  .eval-check-item.checked { background:#f0fdf4;border-color:#86efac; }
  .eval-check-box { width:18px;height:18px;border-radius:4px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all 0.15s; }
  .eval-check-item.checked .eval-check-box { background:#16a34a;border-color:#16a34a;color:#fff; }
  .eval-check-label { font-size:13px;color:#374151;flex:1; }
  .eval-check-item.checked .eval-check-label { color:#15803d;font-weight:500; }
  .eval-concern-item { display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:background 0.15s; }
  .eval-concern-item:hover { background:#f1f5f9; }
  .eval-concern-item.flagged { background:#fef2f2;border-color:#fca5a5; }
  .eval-concern-item.flagged .eval-check-box { background:#dc2626;border-color:#dc2626;color:#fff; }
  .eval-concern-item.flagged .eval-check-label { color:#b91c1c;font-weight:500; }
  .btn-save-eval { background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit; }
  .btn-save-eval:hover { opacity:0.9; }
  .eval-saved-badge { display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:6px 12px;font-size:12px;color:#15803d;font-weight:600; }
  .eval-empty { text-align:center;padding:32px 0;color:#94a3b8;font-size:13px; }
  .eval-readonly-field { font-size:13px;color:#1e293b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;min-height:36px; }

  /* ── About tab ── */
  .about-wrap { max-width:820px; }
  .about-hero { background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 60%,#2563eb 100%); border-radius:18px; padding:36px 40px; margin-bottom:28px; color:#fff; position:relative; overflow:hidden; }
  .about-hero::before { content:''; position:absolute; right:-30px; top:-30px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,0.06); }
  .about-hero::after { content:''; position:absolute; right:60px; bottom:-50px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .about-hero-tag { display:inline-block; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3); border-radius:20px; padding:4px 14px; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:14px; }
  .about-hero-title { font-size:26px; font-weight:800; line-height:1.2; margin-bottom:8px; }
  .about-hero-sub { font-size:14px; color:rgba(255,255,255,0.75); line-height:1.6; max-width:520px; }
  .about-section { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:28px 32px; margin-bottom:20px; }
  .about-section-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid #f1f5f9; }
  .about-section-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .about-section-title { font-size:17px; font-weight:700; color:#0f172a; }
  .about-section-sub { font-size:12px; color:#94a3b8; margin-top:2px; }
  .about-role-text { font-size:14px; color:#374151; line-height:1.75; }
  .about-role-text + .about-role-text { margin-top:12px; }
  .resp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .resp-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:16px 18px; display:flex; gap:12px; align-items:flex-start; }
  .resp-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
  .resp-title { font-size:13px; font-weight:700; color:#0f172a; margin-bottom:4px; }
  .resp-desc { font-size:12px; color:#64748b; line-height:1.55; }
  .process-steps { display:flex; flex-direction:column; }

  /* ── Ethics Report ── */
  .btn-release-report { background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px; }

  /* ── Ethics Report Modal ── */
  .ethics-modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;overflow-y:auto; }

  .ethics-report-org { font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;position:relative;z-index:1; }
  .ethics-report-title { font-size:22px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:6px;position:relative;z-index:1; }
  .ethics-report-subtitle { font-size:13px;color:rgba(255,255,255,0.65);position:relative;z-index:1; }
  .ethics-report-meta-bar { display:flex;gap:16px;margin-top:20px;flex-wrap:wrap;position:relative;z-index:1; }
  .ethics-meta-chip { background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,0.85);font-weight:500; }
  .ethics-meta-chip strong { color:#fff;font-weight:700; }
  .ethics-report-body { padding:32px 40px; }
  .ethics-section { margin-bottom:28px; }
  .ethics-section-title { font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#6366f1;margin-bottom:14px;display:flex;align-items:center;gap:8px; }
  .ethics-section-title::after { content:'';flex:1;height:1px;background:linear-gradient(to right,#e0e7ff,transparent); }
  .ethics-verdict-card { border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:24px; }
  .ethics-verdict-icon { font-size:36px;flex-shrink:0; }

  .ethics-score-ring-wrap { display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px; }
  .ethics-score-pill { flex:1;min-width:130px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;text-align:center; }
  .ethics-score-pill-val { font-size:26px;font-weight:800;line-height:1; }

  .ethics-notes-box { background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;font-size:13px;color:#374151;line-height:1.75;white-space:pre-wrap; }
  .ethics-conditions-box { background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px 20px;font-size:13px;color:#92400e;line-height:1.75; }

  .ethics-footer-sig { font-size:12px;color:#64748b; }
  .ethics-footer-sig strong { color:#374151; }
  .ethics-close-btn { background:#1e293b;color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }
  .ethics-close-btn:hover { background:#0f172a; }

  /* Admin report request notification */
  .report-req-card { background:#fff;border:1px solid #e0e7ff;border-left:4px solid #6366f1;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px; }
  .report-req-icon { width:38px;height:38px;border-radius:10px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }

  .btn-decline-report:hover { background:#fee2e2; }

<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWPIG3aPB_JLcs3xEvn-OsLpR4UVgaas61S_LIKh4J2abVdvqWrwlp3XxXDDjLOB0ytw/exec";

const STATUSES = [
  "For Receiving of the Secretary-General","For Confirmation of Request",
  "Request Not Confirmed","Ethics Compliance on Review","On Proper Hearing",
  "For Deliberation","For 2nd Hearing","Rejected","Approved with Amendments",
  "Approved without Amendments","In Appeal","Rejected Appeal (With Finality)",
  "Appeal Accepted with Provisions"
];
const NEEDS_JUST = [
  "Request Not Confirmed","Rejected","Approved with Amendments",
  "Approved without Amendments","Rejected Appeal (With Finality)","Appeal Accepted with Provisions"
];
const CAN_RESPOND = [
  "Request Not Confirmed","Rejected","Approved with Amendments",
  "Rejected Appeal (With Finality)","Appeal Accepted with Provisions"
];

// Evaluation criteria checklist
const COMPLIANCE_CHECKS = [
  "Informed consent procedures are clearly defined",
  "Research design minimizes risk to participants",
  "Data privacy and confidentiality measures are in place",
  "Vulnerable population protections are addressed",
  "Conflict of interest disclosures are complete",
  "Research methodology is scientifically sound",
  "Benefits to participants/community are clearly stated",
  "Withdrawal rights of participants are guaranteed"
];
const CONCERN_FLAGS = [
  "Insufficient risk mitigation plan",
  "Unclear or missing informed consent process",
  "Privacy/data security concerns identified",
  "Potential exploitation of vulnerable groups",
  "Undisclosed conflicts of interest",
  "Inadequate researcher qualifications",
  "Unrealistic or unverified benefit claims",
  "Non-compliance with applicable laws or regulations"
];

const S = {
  isAdmin:false, showLogin:false, showJust:false,
  activeTab:"cases", expandedId:null,
  pendingId:null, pendingStatus:null, justText:"",
  loginUser:"", loginPass:"",
  newTitle:"", newField:"", newFiledBy:"",
  cases:[], loading:true, syncStatus:"synced",
  msgDrafts:{},
  replyDrafts:{},
  inboxExpanded:null,
  // per-case inner tab: "overview" | "messages" | "evaluation"
  caseTabs:{},
  // per-case evaluation drafts (not yet saved)
  evalDrafts:{},
  // ethics report
  viewingReport:null, // caseId of the report being viewed
  reportDeclineId:null // for decline confirmation
};

function showToast(msg, ms=2800) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), ms);
}

async function loadFromSheets() {
  try {
    const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      S.cases = data.map(c => ({
        ...c, id: Number(c.id),
        timeline: typeof c.timeline === "string" ? JSON.parse(c.timeline||"[]") : (c.timeline||[]),
        messages: typeof c.messages === "string" ? JSON.parse(c.messages||"[]") : (c.messages||[]),
        evaluation: typeof c.evaluation === "string" ? JSON.parse(c.evaluation||"null") : (c.evaluation||null),
        ethicsReportStatus: c.ethicsReportStatus || null // null | "requested" | "sent" | "declined"
      }));
    } else {
      S.cases = [];
    }
  } catch(e) {
    const backup = localStorage.getItem("erb_backup");
    S.cases = backup ? JSON.parse(backup) : [];
    showToast("⚠️ Offline — using local backup");
  }
  S.loading = false;
  if (S.cases.length) S.expandedId = S.cases[S.cases.length-1].id;
  render();
}

async function saveToSheets() {
  localStorage.setItem("erb_backup", JSON.stringify(S.cases));
  S.syncStatus = "saving"; updateSyncBadge();
  try {
    await fetch(SCRIPT_URL, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(S.cases)
    });
    S.syncStatus = "synced"; updateSyncBadge();
    showToast("☁️ Synced to cloud!");
  } catch(e) {
    S.syncStatus = "error"; updateSyncBadge();
    showToast("⚠️ Saved locally — sync failed");
  }
}

function updateSyncBadge() {
  const el = document.getElementById("sync-badge");
  if (!el) return;
  const map = {
    saving: `<div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:4px;">🔄 Syncing...</div><div style="font-size:10px;color:#475569;">Saving to cloud...</div>`,
    synced: `<div style="font-size:10px;font-weight:600;color:#22c55e;margin-bottom:4px;">☁️ Cloud Sync ON</div><div style="font-size:10px;color:#475569;">Synced across all devices.</div>`,
    error:  `<div style="font-size:10px;font-weight:600;color:#ef4444;margin-bottom:4px;">⚠️ Sync Error</div><div style="font-size:10px;color:#475569;">Check internet connection.</div>`
  };
  el.innerHTML = map[S.syncStatus] || map.synced;
}

function statusMeta(s) {
  if (s.includes("Approved"))        return {bg:"#dcfce7",color:"#15803d",border:"#86efac",dot:"#16a34a",icon:"✅"};
  if (s==="Rejected"||s==="Rejected Appeal (With Finality)") return {bg:"#fee2e2",color:"#b91c1c",border:"#fca5a5",dot:"#dc2626",icon:"❌"};
  if (s==="Request Not Confirmed")   return {bg:"#fee2e2",color:"#b91c1c",border:"#fca5a5",dot:"#dc2626",icon:"❌"};
  if (s==="In Appeal"||s==="Appeal Accepted with Provisions") return {bg:"#fef9c3",color:"#854d0e",border:"#fde047",dot:"#ca8a04",icon:"⚖️"};
  return {bg:"#dbeafe",color:"#1d4ed8",border:"#93c5fd",dot:"#2563eb",icon:"📋"};
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function countUnread() {
  return S.cases.reduce((n,c)=>n+((c.messages||[]).filter(m=>m.from==="researcher"&&!m.read).length),0);
}

/* ── Message senders ── */
async function sendResearcherMessage(caseId) {
  const draft = (S.msgDrafts[caseId]||"").trim();
  if (!draft) { showToast("⚠️ Please type a message first."); return; }
  S.cases = S.cases.map(c => {
    if (c.id !== caseId) return c;
    return {...c, messages:[...(c.messages||[]), {from:"researcher",text:draft,date:new Date().toLocaleString(),read:false}]};
  });
  S.msgDrafts[caseId] = "";
  render(); await saveToSheets();
  showToast("✉️ Message sent to the board!");
}

async function sendAdminReply(caseId) {
  const draft = (S.replyDrafts[caseId]||"").trim();
  if (!draft) { showToast("⚠️ Please type a reply first."); return; }
  S.cases = S.cases.map(c => {
    if (c.id !== caseId) return c;
    return {...c, messages:[...(c.messages||[]), {from:"admin",text:draft,date:new Date().toLocaleString(),read:true}]};
  });
  S.replyDrafts[caseId] = "";
  render(); await saveToSheets();
  showToast("📨 Reply sent to researcher!");
}

function markCaseRead(caseId) {
  S.cases = S.cases.map(c => {
    if (c.id !== caseId) return c;
    return {...c, messages:(c.messages||[]).map(m=>m.from==="researcher"?{...m,read:true}:m)};
  });
}

/* ── Evaluation helpers ── */
function getEvalDraft(caseId) {
  if (!S.evalDrafts[caseId]) {
    const saved = (S.cases.find(c=>c.id===caseId)||{}).evaluation || null;
    S.evalDrafts[caseId] = saved ? JSON.parse(JSON.stringify(saved)) : {
      reviewerName:"", reviewDate: new Date().toLocaleDateString(),
      riskLevel:"", studyType:"",
      ethicsScore:0, methodScore:0, consentScore:0, dataScore:0, benefitScore:0,
      compliance: Array(COMPLIANCE_CHECKS.length).fill(false),
      concerns: Array(CONCERN_FLAGS.length).fill(false),
      overallNotes:"", recommendation:"", conditions:"",
      savedAt:null
    };
  }
  return S.evalDrafts[caseId];
}

function setEvalField(caseId, field, value) {
  const d = getEvalDraft(caseId);
  d[field] = value;
  render();
}

function toggleEvalCheck(caseId, field, idx) {
  const d = getEvalDraft(caseId);
  d[field][idx] = !d[field][idx];
  render();
}

function setEvalRating(caseId, field, val) {
  const d = getEvalDraft(caseId);
  d[field] = d[field]===val ? 0 : val;
  render();
}

function calcEvalScore(d) {
  const scores = [d.ethicsScore,d.methodScore,d.consentScore,d.dataScore,d.benefitScore].filter(s=>s>0);
  if (!scores.length) return 0;
  return Math.round((scores.reduce((a,b)=>a+b,0)/scores.length)*10)/10;
}

function scoreVerdict(avg) {
  if (!avg) return {label:"Not yet rated",color:"#64748b",bg:"rgba(255,255,255,0.2)"};
  if (avg>=4.5) return {label:"Highly Recommended",color:"#fff",bg:"rgba(34,197,94,0.35)"};
  if (avg>=3.5) return {label:"Recommended",color:"#fff",bg:"rgba(74,222,128,0.25)"};
  if (avg>=2.5) return {label:"Needs Revision",color:"#fff",bg:"rgba(251,191,36,0.35)"};
  return {label:"Not Recommended",color:"#fff",bg:"rgba(248,113,113,0.35)"};
}

async function saveEvaluation(caseId) {
  const d = getEvalDraft(caseId);
  d.savedAt = new Date().toLocaleString();
  S.cases = S.cases.map(c => c.id===caseId ? {...c, evaluation: JSON.parse(JSON.stringify(d))} : c);
  render(); await saveToSheets();
  showToast("📋 Evaluation saved!");
}

/* ── Status & case actions ── */
async function applyStatus(id,status,just){
  S.cases=S.cases.map(c=>c.id===id?{...c,status,justification:just||c.justification,timeline:[...c.timeline,{status,date:new Date().toLocaleString()}]}:c);
  render(); await saveToSheets();
}
function tryUpdate(id,status){
  if(NEEDS_JUST.includes(status)){S.pendingId=id;S.pendingStatus=status;S.showJust=true;}
  else applyStatus(id,status,"");
  render();
}
async function submitJust(){
  if(!S.pendingId||!S.pendingStatus||!S.justText.trim())return;
  await applyStatus(S.pendingId,S.pendingStatus,S.justText);
  S.showJust=false;S.pendingId=null;S.pendingStatus=null;S.justText="";render();
}
async function requestEthicsReport(caseId) {
  S.cases = S.cases.map(c => c.id===caseId ? {...c, ethicsReportStatus:"released"} : c);
  render(); await saveToSheets();
  showToast("📨 Ethics Report has been released to researcher!");
}
async function researcherRequestReport(caseId) {
  S.cases = S.cases.map(c => c.id===caseId ? {...c, ethicsReportStatus:"requested"} : c);
  render(); await saveToSheets();
  showToast("📩 Report request sent to the board!");
}
async function sendEthicsReport(caseId) {
  S.cases = S.cases.map(c => c.id===caseId ? {...c, ethicsReportStatus:"sent"} : c);
  render(); await saveToSheets();
  showToast("📄 Ethics Report has been released to researcher!");
}
async function declineEthicsReport(caseId) {
  S.cases = S.cases.map(c => c.id===caseId ? {...c, ethicsReportStatus:"declined"} : c);
  render(); await saveToSheets();
  showToast("🚫 Ethics Report request declined.");
}
function viewEthicsReport(caseId) {
  S.viewingReport = caseId;
  render();
}
function doLogin(){
  if(S.loginUser==="admin"&&S.loginPass==="chair-only"){S.isAdmin=true;S.showLogin=false;S.loginUser="";S.loginPass="";}
  else alert("Invalid credentials.");
  render();
}
async function addCase(){
  if(!S.newTitle.trim()||!S.newField.trim()||!S.newFiledBy.trim()){alert("Please fill in all fields.");return;}
  const id=S.cases.length?Math.max(...S.cases.map(c=>c.id))+1:1;
  S.cases.push({id,title:S.newTitle.trim(),field:S.newField.trim(),filedBy:S.newFiledBy.trim(),
    status:"For Receiving of the Secretary-General",justification:"",
    timeline:[{status:"For Receiving of the Secretary-General",date:new Date().toLocaleString()}],
    messages:[], evaluation:null, ethicsReportStatus:null
  });
  S.newTitle="";S.newField="";S.newFiledBy="";S.activeTab="cases";S.expandedId=id;
  render(); await saveToSheets();
}
async function deleteCase(id){
  if(!confirm("Delete this case permanently?"))return;
  S.cases=S.cases.filter(c=>c.id!==id);
  if(S.expandedId===id)S.expandedId=null;
  render(); await saveToSheets();
}

/* ══════════════════════════ RENDER ══════════════════════════ */
function render(){
  const {cases,isAdmin,activeTab,loading}=S;
  if(loading){
    document.getElementById("root").innerHTML=`
      <div class="nav"><div style="display:flex;align-items:center;gap:14px;"><div class="nav-logo">N</div><div><div class="nav-title">National Ethics Review Board</div><div class="nav-sub">Republic Research Ethics Oversight System</div></div></div></div>
      <div class="loading-screen"><div class="spinner"></div><div style="font-size:14px;">Loading cases from cloud...</div></div>`;
    return;
  }
  const approved=cases.filter(c=>c.status.includes("Approved")).length;
  const rejected=cases.filter(c=>c.status.includes("Rejected")||c.status==="Request Not Confirmed").length;
  const inAppeal=cases.filter(c=>c.status==="In Appeal").length;
  const inProgress=cases.length-approved-rejected-inAppeal;
  const unread=countUnread();
  const pendingReports=cases.filter(c=>c.ethicsReportStatus==="requested").length;

  document.getElementById("root").innerHTML=`
  <div class="nav">
    <div style="display:flex;align-items:center;gap:14px;">
      <div class="nav-logo">N</div>
      <div><div class="nav-title">National Ethics Review Board</div><div class="nav-sub">Republic Research Ethics Oversight System</div></div>
    </div>
    ${!isAdmin
      ?`<button class="btn-login" onclick="S.showLogin=true;render()">🔒 Admin Login</button>`
      :`<div style="display:flex;align-items:center;gap:12px;"><div class="admin-badge"><div class="admin-dot">A</div><span style="font-size:13px;color:#fff;font-weight:500;">Admin</span></div><button class="btn-logout" onclick="S.isAdmin=false;render()">Log out</button></div>`}
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-label">Navigation</div>
      <button class="nav-btn ${activeTab==="cases"?"active":""}" onclick="S.activeTab='cases';render()">📋 Case List</button>
      <button class="nav-btn ${activeTab==="file"?"active":""}" onclick="S.activeTab='file';render()">📝 File a Case</button>
      ${isAdmin?`<button class="nav-btn ${activeTab==="inbox"?"active":""}" onclick="S.activeTab='inbox';render()">📬 Inbox${unread>0?`<span class="nav-badge">${unread}</span>`:""}</button>`:""}
      ${isAdmin?`<button class="nav-btn ${activeTab==="reports"?"active":""}" onclick="S.activeTab='reports';render()">📄 Report Requests${pendingReports>0?`<span class="nav-badge">${pendingReports}</span>`:""}</button>`:""}
      <button class="nav-btn ${activeTab==="about"?"active":""}" onclick="S.activeTab='about';render()">🏛️ About the Committee</button>
      <div class="sidebar-stats">
        <div class="stats-title">Summary</div>
        <div class="stat-row"><span class="stat-label">Total</span><span class="stat-val" style="color:#93c5fd">${cases.length}</span></div>
        <div class="stat-row"><span class="stat-label">Approved</span><span class="stat-val" style="color:#86efac">${approved}</span></div>
        <div class="stat-row"><span class="stat-label">Rejected</span><span class="stat-val" style="color:#fca5a5">${rejected}</span></div>
        <div class="stat-row"><span class="stat-label">In Progress</span><span class="stat-val" style="color:#fde68a">${inProgress}</span></div>
      </div>
      <div class="sync-box" id="sync-badge">
        <div style="font-size:10px;font-weight:600;color:#22c55e;margin-bottom:4px;">☁️ Cloud Sync ON</div>
        <div style="font-size:10px;color:#475569;">Synced across all devices.</div>
      </div>
    </div>
    <div class="content">
      ${isAdmin?`
      <div class="metrics">
        <div class="metric-card" style="background:#fff;border-top:4px solid #2563eb;"><div class="metric-card-inner"><div><div class="metric-label">Total Cases</div><div class="metric-val" style="color:#2563eb">${cases.length}</div></div><span style="font-size:22px;">📁</span></div></div>
        <div class="metric-card" style="background:#f0fdf4;border-top:4px solid #16a34a;"><div class="metric-card-inner"><div><div class="metric-label">Approved</div><div class="metric-val" style="color:#16a34a">${approved}</div></div><span style="font-size:22px;">✅</span></div></div>
        <div class="metric-card" style="background:#fef2f2;border-top:4px solid #dc2626;"><div class="metric-card-inner"><div><div class="metric-label">Rejected</div><div class="metric-val" style="color:#dc2626">${rejected}</div></div><span style="font-size:22px;">❌</span></div></div>
        <div class="metric-card" style="background:#fffbeb;border-top:4px solid #d97706;"><div class="metric-card-inner"><div><div class="metric-label">In Appeal</div><div class="metric-val" style="color:#d97706">${inAppeal}</div></div><span style="font-size:22px;">⚖️</span></div></div>
      </div>`:""}
      ${activeTab==="cases"?renderCases():activeTab==="file"?renderForm():activeTab==="inbox"&&isAdmin?renderInbox():activeTab==="reports"&&isAdmin?renderReportRequests():renderAbout()}
    </div>
  </div>
  ${S.showLogin?renderLoginModal():""}
  ${S.showJust?renderJustModal():""}
  ${S.viewingReport?renderEthicsReportModal(S.viewingReport):""}`;

  const lu=document.getElementById("lu"); if(lu)lu.value=S.loginUser;
  const lp=document.getElementById("lp"); if(lp)lp.value=S.loginPass;
  const jt=document.getElementById("jt"); if(jt)jt.value=S.justText;
  // Restore textarea drafts
  Object.keys(S.msgDrafts).forEach(id=>{const el=document.getElementById("msgdraft_"+id);if(el)el.value=S.msgDrafts[id]||"";});
  Object.keys(S.replyDrafts).forEach(id=>{const el=document.getElementById("replydraft_"+id);if(el)el.value=S.replyDrafts[id]||"";});
  S.cases.forEach(c=>{
    const d=S.evalDrafts[c.id];
    if(!d) return;
    ["overallNotes","conditions"].forEach(f=>{const el=document.getElementById("eval_"+f+"_"+c.id);if(el)el.value=d[f]||"";});
    ["reviewerName","reviewDate","studyType"].forEach(f=>{const el=document.getElementById("eval_"+f+"_"+c.id);if(el)el.value=d[f]||"";});
  });
}

/* ── Case inner tab renderer ── */
function caseInnerTab(caseId) { return S.caseTabs[caseId]||"overview"; }

function renderCaseBody(c, isAdmin) {
  const tab = caseInnerTab(c.id);
  const unreadCount = (c.messages||[]).filter(m=>m.from==="researcher"&&!m.read).length;
  const hasEval = !!c.evaluation;

  const tabs = isAdmin
    ? [
        {key:"overview", label:"📋 Overview"},
        {key:"messages", label:`💬 Messages${unreadCount>0?` (${unreadCount} new)`:""}` },
        {key:"evaluation", label:`🔬 Evaluation${hasEval?" ✓":""}`}
      ]
    : [
        {key:"overview", label:"📋 Overview"},
        {key:"messages", label:"💬 Responses"},
        ...(c.ethicsReportStatus==="sent"||c.ethicsReportStatus==="requested"||c.ethicsReportStatus==="released"||c.ethicsReportStatus==="declined"?[{key:"report",label:`📄 Ethics Report${c.ethicsReportStatus==="sent"?" ✓":c.ethicsReportStatus==="requested"?" ⏳":c.ethicsReportStatus==="released"?" 🔔":""}`}]:[])
      ];

  return `<div class="case-tabs">
    ${tabs.map(t=>`<button class="case-tab ${tab===t.key?"active":""}" onclick="S.caseTabs[${c.id}]='${t.key}';render()">${t.label}</button>`).join("")}
  </div>
  <div class="case-tab-body">
    ${tab==="overview" ? renderOverviewTab(c, isAdmin) : tab==="messages" ? renderMessagesTab(c, isAdmin) : tab==="evaluation" ? renderEvaluationTab(c) : renderResearcherReportTab(c)}
  </div>`;
}

function renderOverviewTab(c, isAdmin) {
  return `${c.justification?`<div class="board-notes"><span>📌</span><span><strong>Board notes:</strong> ${esc(c.justification)}</span></div>`:""}
    <div style="margin-bottom:${isAdmin?"16px":"0"};">
      <div class="timeline-label">Status Timeline</div>
      <div class="timeline"><div class="timeline-line"></div>
        ${c.timeline.map((t,i)=>{const cur=i===c.timeline.length-1;return`<div class="timeline-item"><div class="timeline-dot ${cur?"current":"past"}"></div><div style="margin-left:4px;"><div class="timeline-status ${cur?"current":"past"}">${esc(t.status)}</div><div class="timeline-date">${esc(t.date)}</div></div></div>`;}).join("")}
      </div>
    </div>
    ${isAdmin?`<div class="update-box"><div class="update-label">Update Status</div>
      <select class="status-select" onchange="tryUpdate(${c.id},this.value)">
        ${STATUSES.map(s=>`<option${s===c.status?" selected":""}>${esc(s)}</option>`).join("")}
      </select></div>
      <button class="btn-delete" onclick="deleteCase(${c.id})">🗑 Delete Case</button>`:""}`;
}

/* ── Messages Tab ──
   RESEARCHER sees: only admin replies (from:"admin")  +  their own sent messages as confirmation
   ADMIN sees: full thread (both sides)
*/
function renderMessagesTab(c, isAdmin) {
  const msgs = c.messages || [];
  const eligible = CAN_RESPOND.includes(c.status);
  const unread = msgs.filter(m=>m.from==="researcher"&&!m.read).length;

  if (isAdmin) {
    // Full thread for admin
    const threadHtml = msgs.length
      ? msgs.map(m=>{
          const isRes=m.from==="researcher";
          return `<div style="display:flex;flex-direction:column;align-items:${isRes?"flex-start":"flex-end"};">
            <div class="msg-bubble ${isRes?"researcher":"admin"}">${esc(m.text)}</div>
            <div class="msg-meta ${isRes?"":"right"}">${isRes?"👤 "+esc(c.filedBy):"🏛️ Board"} &nbsp;·&nbsp; ${esc(m.date)}${isRes&&!m.read?' &nbsp;<span style="color:#ef4444;font-weight:700;font-size:10px;">● Unread</span>':""}</div>
          </div>`;
        }).join("")
      : `<div class="msg-empty">No messages yet for this case.</div>`;

    return `<div class="msg-section-label">📨 Researcher Messages${unread>0?` <span class="msg-unread-dot"></span> <span style="color:#ef4444;font-size:10px;">${unread} unread</span>`:""}</div>
      <div class="msg-thread">${threadHtml}</div>
      <div class="msg-compose">
        <div class="msg-compose-label">📝 Reply to Researcher</div>
        <textarea id="replydraft_${c.id}" class="msg-textarea" placeholder="Type your official board reply..." oninput="S.replyDrafts[${c.id}]=this.value"></textarea>
        <button class="btn-send" onclick="sendAdminReply(${c.id})">Send Reply ➤</button>
      </div>`;
  } else {
    // Researcher sees ONLY admin replies + their own sent items as "sent confirmation"
    const adminReplies = msgs.filter(m=>m.from==="admin");
    const mySentCount = msgs.filter(m=>m.from==="researcher").length;

    const repliesHtml = adminReplies.length
      ? adminReplies.map(m=>`<div style="display:flex;flex-direction:column;align-items:flex-start;">
          <div class="msg-bubble admin" style="background:#eff6ff;border-color:#bfdbfe;color:#1e40af;">${esc(m.text)}</div>
          <div class="msg-meta">🏛️ Board Reply &nbsp;·&nbsp; ${esc(m.date)}</div>
        </div>`).join("")
      : `<div class="msg-empty">No board replies yet. Your message has been received.</div>`;

    const sentNote = mySentCount>0
      ? `<div class="msg-sent-confirm">✅ You have sent <strong>${mySentCount}</strong> message${mySentCount>1?"s":""} to the board. Replies from the board will appear here.</div>`
      : "";

    const composeBox = eligible
      ? `<div class="msg-compose">
          <div class="msg-compose-label">✉️ Send a Response to the Board</div>
          <textarea id="msgdraft_${c.id}" class="msg-textarea" placeholder="Type your response, clarification, or appeal note here..." oninput="S.msgDrafts[${c.id}]=this.value"></textarea>
          <button class="btn-send" onclick="sendResearcherMessage(${c.id})">Send Message ➤</button>
        </div>`
      : `<div class="msg-eligible-note">💡 Messaging is available when your case status is: <strong>Request Not Confirmed, Rejected, Approved with Amendments, Rejected Appeal (With Finality),</strong> or <strong>Appeal Accepted with Provisions</strong>.</div>`;

    return `${sentNote}
      <div class="msg-section-label" style="margin-bottom:10px;">📬 Board Replies</div>
      <div class="msg-thread">${repliesHtml}</div>
      ${composeBox}`;
  }
}

/* ── Evaluation Tab (Admin only) ── */
function renderEvaluationTab(c) {
  const d = getEvalDraft(c.id);
  const avg = calcEvalScore(d);
  const verdict = scoreVerdict(avg);

  function ratingBtns(field, current) {
    return [1,2,3,4,5].map(n=>`<button class="rating-btn ${current===n?"sel-"+n:""}" onclick="setEvalRating(${c.id},'${field}',${n})">${n}${current===n?" ★":""}</button>`).join("");
  }

  return `
    <!-- Score summary -->
    <div class="eval-score-display">
      <div>
        <div class="eval-score-num">${avg||"—"}</div>
        <div class="eval-score-label">Overall Score (out of 5)</div>
      </div>
      <div style="text-align:right;">
        <div class="eval-score-verdict" style="background:${verdict.bg};">${verdict.label}</div>
        ${d.savedAt?`<div style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:6px;">Last saved: ${esc(d.savedAt)}</div>`:""}
      </div>
    </div>

    <!-- Reviewer info -->
    <div class="eval-section">
      <div class="eval-section-title">👤 Reviewer Information</div>
      <div class="eval-grid">
        <div class="eval-field">
          <label class="eval-label">Reviewer / Board Member Name</label>
          <input id="eval_reviewerName_${c.id}" class="eval-input" placeholder="Enter name" oninput="getEvalDraft(${c.id}).reviewerName=this.value" value="${esc(d.reviewerName)}" />
        </div>
        <div class="eval-field">
          <label class="eval-label">Date of Evaluation</label>
          <input id="eval_reviewDate_${c.id}" class="eval-input" type="date" oninput="getEvalDraft(${c.id}).reviewDate=this.value" value="${esc(d.reviewDate)}" />
        </div>
        <div class="eval-field">
          <label class="eval-label">Risk Level</label>
          <select class="eval-select" onchange="setEvalField(${c.id},'riskLevel',this.value)">
            <option value="">— Select —</option>
            ${["Minimal Risk","Low Risk","Moderate Risk","High Risk","Critical Risk"].map(r=>`<option${d.riskLevel===r?" selected":""}>${r}</option>`).join("")}
          </select>
        </div>
        <div class="eval-field">
          <label class="eval-label">Study Type / Design</label>
          <select id="eval_studyType_${c.id}" class="eval-select" onchange="setEvalField(${c.id},'studyType',this.value)">
            <option value="">— Select —</option>
            ${["Randomized Controlled Trial","Observational / Cohort","Case-Control","Cross-sectional","Qualitative","Mixed Methods","Experimental","Meta-Analysis / Review"].map(t=>`<option${d.studyType===t?" selected":""}>${t}</option>`).join("")}
          </select>
        </div>
      </div>
    </div>

    <!-- Scoring criteria -->
    <div class="eval-section">
      <div class="eval-section-title">⭐ Scoring Criteria <span style="font-size:10px;font-weight:400;color:#94a3b8;">(1 = Poor · 5 = Excellent)</span></div>
      ${[
        {key:"ethicsScore",   label:"Ethics & Integrity",         desc:"Adherence to ethical principles and research standards"},
        {key:"methodScore",   label:"Methodology & Design",       desc:"Scientific rigor and validity of research design"},
        {key:"consentScore",  label:"Informed Consent Process",   desc:"Clarity and completeness of consent procedures"},
        {key:"dataScore",     label:"Data Privacy & Security",    desc:"Adequacy of participant data protection measures"},
        {key:"benefitScore",  label:"Benefit-Risk Assessment",    desc:"Proportion of expected benefits versus potential harms"},
      ].map(cr=>`<div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div>
            <div class="eval-label">${cr.label}</div>
            <div style="font-size:11px;color:#94a3b8;">${cr.desc}</div>
          </div>
          ${d[cr.key]?`<span style="font-size:18px;font-weight:800;color:${d[cr.key]>=4?"#16a34a":d[cr.key]>=3?"#d97706":"#dc2626"}">${d[cr.key]}</span>`:""}
        </div>
        <div class="rating-row">${ratingBtns(cr.key, d[cr.key])}</div>
      </div>`).join("")}
    </div>

    <!-- Compliance checklist -->
    <div class="eval-section">
      <div class="eval-section-title">✅ Ethics Compliance Checklist</div>
      <div class="eval-checklist">
        ${COMPLIANCE_CHECKS.map((item,i)=>`
          <div class="eval-check-item ${d.compliance[i]?"checked":""}" onclick="toggleEvalCheck(${c.id},'compliance',${i})">
            <div class="eval-check-box">${d.compliance[i]?"✓":""}</div>
            <div class="eval-check-label">${item}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:8px;font-size:12px;color:#64748b;">${d.compliance.filter(Boolean).length} / ${COMPLIANCE_CHECKS.length} criteria met</div>
    </div>

    <!-- Concern flags -->
    <div class="eval-section">
      <div class="eval-section-title">🚩 Concern Flags</div>
      <div class="eval-checklist">
        ${CONCERN_FLAGS.map((item,i)=>`
          <div class="eval-concern-item ${d.concerns[i]?"flagged":""}" onclick="toggleEvalCheck(${c.id},'concerns',${i})">
            <div class="eval-check-box" style="${d.concerns[i]?"":"border-color:#fca5a5;"}">${d.concerns[i]?"✗":""}</div>
            <div class="eval-check-label">${item}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:8px;font-size:12px;color:${d.concerns.filter(Boolean).length>0?"#dc2626":"#64748b"};">${d.concerns.filter(Boolean).length} concern${d.concerns.filter(Boolean).length!==1?"s":""} flagged</div>
    </div>

    <!-- Notes & Recommendation -->
    <div class="eval-section">
      <div class="eval-section-title">📝 Board Notes & Recommendation</div>
      <div class="eval-field" style="margin-bottom:12px;">
        <label class="eval-label">Overall Evaluation Notes</label>
        <textarea id="eval_overallNotes_${c.id}" class="eval-textarea" rows="4" placeholder="Write a comprehensive evaluation summary, including observations on the study's ethical standing, methodology, and any notable strengths or weaknesses..." oninput="getEvalDraft(${c.id}).overallNotes=this.value">${esc(d.overallNotes)}</textarea>
      </div>
      <div class="eval-grid" style="margin-bottom:12px;">
        <div class="eval-field">
          <label class="eval-label">Board Recommendation</label>
          <select class="eval-select" onchange="setEvalField(${c.id},'recommendation',this.value)">
            <option value="">— Select —</option>
            ${["Approve without Amendments","Approve with Minor Amendments","Approve with Major Amendments","Request Full Re-submission","Reject"].map(r=>`<option${d.recommendation===r?" selected":""}>${r}</option>`).join("")}
          </select>
        </div>
        <div class="eval-field">
          <label class="eval-label" style="color:${d.concerns.filter(Boolean).length>0?"#dc2626":"inherit"}">
            ${d.concerns.filter(Boolean).length>0?"⚠️ ":""}Conditions / Required Amendments
          </label>
          <input id="eval_conditions_${c.id}" class="eval-input" placeholder="${d.recommendation&&d.recommendation.includes("Amend")?"List required amendments...":"Not applicable"}" oninput="getEvalDraft(${c.id}).conditions=this.value" value="${esc(d.conditions)}" />
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn-save-eval" onclick="saveEvaluation(${c.id})">💾 Save Evaluation</button>
        ${c.evaluation?`<div class="eval-saved-badge">✓ Evaluation on record · ${esc(c.evaluation.savedAt||"")}</div>`:""}
      </div>
      ${c.evaluation?`
      <div style="margin-top:20px;padding-top:20px;border-top:1px solid #e2e8f0;">
        <div style="font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">📄 Ethics Report Release</div>
        ${c.ethicsReportStatus===null?`
          <div style="font-size:13px;color:#64748b;margin-bottom:10px;">Release the official Ethics Report to the researcher. They will be notified and can request to view it.</div>
          <button class="btn-release-report" onclick="requestEthicsReport(${c.id})">📤 Release Ethics Report</button>
        `:c.ethicsReportStatus==="released"?`
          <div class="report-pending-note">📬 <span>Ethics Report has been released. Researcher has been notified and may request to view it — check <strong>Report Requests</strong> tab once they do.</span></div>
          <div style="margin-top:8px;"><span class="report-request-badge">📤 Released — Awaiting Researcher Request</span></div>
        `:c.ethicsReportStatus==="requested"?`
          <div class="report-pending-note">⏳ <span>Researcher has formally requested the report. Go to <strong>Report Requests</strong> tab to send or decline.</span></div>
          <div style="margin-top:8px;"><span class="report-request-badge" style="background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;">📩 Request Received — Pending Your Action</span></div>
        `:c.ethicsReportStatus==="sent"?`
          <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:10px 14px;font-size:12px;color:#15803d;display:flex;align-items:center;gap:8px;">✅ <span><strong>Ethics Report has been sent</strong> to the researcher.</span></div>
        `:c.ethicsReportStatus==="declined"?`
          <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:12px;color:#b91c1c;display:flex;align-items:center;gap:8px;">🚫 <span>Report request was declined. You may re-release if needed.</span></div>
          <button class="btn-release-report" style="margin-top:10px;" onclick="requestEthicsReport(${c.id})">📤 Re-Release Ethics Report</button>
        `:""}
      </div>`:""}
    </div>`;
}

/* ── Cases list ── */
function renderCases(){
  const {cases,expandedId,isAdmin}=S;
  if(!cases.length) return `<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">📂</div><div style="font-size:14px;">No cases filed yet.</div></div>`;
  return `<div>
    <div class="section-header"><h2 class="section-title">Active Cases</h2><span class="case-count">${cases.length} case${cases.length!==1?"s":""}</span></div>
    ${cases.map(c=>{
      const m=statusMeta(c.status); const isOpen=expandedId===c.id;
      const unreadCount=(c.messages||[]).filter(msg=>msg.from==="researcher"&&!msg.read).length;
      const hasAdminReply=(c.messages||[]).some(msg=>msg.from==="admin");
      return `<div class="case-card ${isOpen?"open":""}">
        <div class="case-header" onclick="S.expandedId=${isOpen?"null":c.id};render()" style="border-left:4px solid ${m.dot};">
          <div class="case-icon" style="background:${m.bg};border:1px solid ${m.border};">${m.icon}</div>
          <div style="flex:1;min-width:0;">
            <div class="case-title-text">${esc(c.title)}</div>
            <div class="case-meta">${esc(c.field)} · Filed by ${esc(c.filedBy)}${isAdmin&&unreadCount>0?` · <span style="color:#ef4444;font-weight:600;">💬 ${unreadCount} new</span>`:""}</div>
          </div>
          <span class="status-badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.border};">${esc(c.status)}</span>
          ${!isAdmin&&hasAdminReply?`<span style="font-size:10px;font-weight:700;background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;border-radius:20px;padding:2px 8px;white-space:nowrap;">📬 Reply</span>`:""}
          <span class="chevron ${isOpen?"open":""}">▾</span>
        </div>
        ${isOpen?`<div class="case-body">${renderCaseBody(c, isAdmin)}</div>`:""}
      </div>`;
    }).join("")}
  </div>`;
}

/* ── Inbox ── */
function renderInbox(){
  const withMsgs = S.cases.filter(c=>(c.messages||[]).some(m=>m.from==="researcher"));
  const unreadTotal = countUnread();
  if(!withMsgs.length) return `<div class="inbox-wrap">
    <div class="section-header"><h2 class="section-title">📬 Researcher Inbox</h2></div>
    <div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">📭</div><div style="font-size:14px;">No messages from researchers yet.</div></div>
  </div>`;

  return `<div class="inbox-wrap">
    <div class="section-header">
      <h2 class="section-title">📬 Researcher Inbox</h2>
      ${unreadTotal>0?`<span class="case-count" style="background:#fee2e2;color:#b91c1c;">${unreadTotal} unread</span>`:`<span class="case-count">All read ✓</span>`}
    </div>
    ${withMsgs.map(c=>{
      const m=statusMeta(c.status);
      const unread=(c.messages||[]).filter(msg=>msg.from==="researcher"&&!msg.read).length;
      const isOpen=S.inboxExpanded===c.id;
      if(isOpen) markCaseRead(c.id);

/* ── Ethics Report Modal ── */
function renderEthicsReportModal(caseId) {
  const c = S.cases.find(x=>x.id===caseId);
  if (!c || !c.evaluation) return "";
  const d = c.evaluation;
  const avg = calcEvalScore(d);
  const verdict = scoreVerdict(avg);

  // Verdict styling
  const vStyle = avg>=4.5?{bg:"linear-gradient(135deg,#052e16,#14532d)",color:"#4ade80",icon:"✅"}
    : avg>=3.5?{bg:"linear-gradient(135deg,#052e16,#166534)",color:"#86efac",icon:"✅"}
    : avg>=2.5?{bg:"linear-gradient(135deg,#451a03,#78350f)",color:"#fcd34d",icon:"⚠️"}
    : {bg:"linear-gradient(135deg,#450a0a,#7f1d1d)",color:"#fca5a5",icon:"❌"};

  const compliancePassed = d.compliance.filter(Boolean).length;
  const concernsFlagged = d.concerns.filter(Boolean).length;

  const scoreItems = [
    {label:"Ethics & Integrity", val:d.ethicsScore},
    {label:"Methodology", val:d.methodScore},
    {label:"Informed Consent", val:d.consentScore},
    {label:"Data Privacy", val:d.dataScore},
    {label:"Benefit-Risk", val:d.benefitScore},
  ];

  function scoreColor(v){return v>=4?"#16a34a":v>=3?"#d97706":"#dc2626";}

  return `<div class="ethics-modal-overlay" onclick="if(event.target.classList.contains('ethics-modal-overlay')){S.viewingReport=null;render();}">
    <div class="ethics-modal">
      <!-- Header -->
      <div class="ethics-report-header">
        <div class="ethics-report-seal">⚖️</div>
        <div class="ethics-report-org">National Ethics Review Board · Official Ethics Report</div>
        <div class="ethics-report-title">${esc(c.title)}</div>
        <div class="ethics-report-subtitle">${esc(c.field)}</div>
        <div class="ethics-report-meta-bar">
          <div class="ethics-meta-chip">👤 <strong>Filed by:</strong> ${esc(c.filedBy)}</div>
          <div class="ethics-meta-chip">📋 <strong>Status:</strong> ${esc(c.status)}</div>
          ${d.reviewerName?`<div class="ethics-meta-chip">🏛️ <strong>Reviewer:</strong> ${esc(d.reviewerName)}</div>`:""}
          ${d.reviewDate?`<div class="ethics-meta-chip">📅 <strong>Date:</strong> ${esc(d.reviewDate)}</div>`:""}
          ${d.riskLevel?`<div class="ethics-meta-chip">⚠️ <strong>Risk:</strong> ${esc(d.riskLevel)}</div>`:""}
        </div>
      </div>

      <div class="ethics-report-body">

        <!-- Verdict -->
        <div class="ethics-section">
          <div class="ethics-section-title">Board Verdict</div>
          <div class="ethics-verdict-card" style="background:${vStyle.bg};">
            <div class="ethics-verdict-icon">${vStyle.icon}</div>
            <div>
              <div class="ethics-verdict-label" style="color:rgba(255,255,255,0.6);">Board Recommendation</div>
              <div class="ethics-verdict-text" style="color:${vStyle.color};">${d.recommendation||verdict.label}</div>
            </div>
            <div style="margin-left:auto;text-align:right;">
              <div style="font-size:40px;font-weight:900;color:#fff;line-height:1;">${avg||"—"}</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:700;letter-spacing:0.06em;">OUT OF 5.0</div>
            </div>
          </div>
        </div>

        <!-- Scores -->
        <div class="ethics-section">
          <div class="ethics-section-title">Evaluation Scores</div>
          <div class="ethics-score-ring-wrap">
            ${scoreItems.map(s=>`<div class="ethics-score-pill">
              <div class="ethics-score-pill-val" style="color:${s.val?scoreColor(s.val):"#94a3b8"};">${s.val||"—"}</div>
              <div style="margin:4px 0 2px;">${"★".repeat(s.val||0)}<span style="color:#e2e8f0;">${"★".repeat(5-(s.val||0))}</span></div>
              <div class="ethics-score-pill-label">${s.label}</div>
            </div>`).join("")}
          </div>
        </div>

        <!-- Compliance -->
        <div class="ethics-section">
          <div class="ethics-section-title">Ethics Compliance Checklist</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            ${COMPLIANCE_CHECKS.map((item,i)=>`
              <div class="ethics-checklist-row ${d.compliance[i]?"pass":"fail"}">
                <span style="font-size:14px;">${d.compliance[i]?"✅":"❌"}</span>
                <span>${item}</span>
              </div>`).join("")}
          </div>
          <div style="margin-top:10px;font-size:12px;font-weight:600;color:${compliancePassed>=6?"#15803d":compliancePassed>=4?"#d97706":"#b91c1c"};">
            ${compliancePassed} / ${COMPLIANCE_CHECKS.length} compliance criteria met
          </div>
        </div>

        <!-- Concerns -->
        ${concernsFlagged>0?`<div class="ethics-section">
          <div class="ethics-section-title" style="color:#dc2626;">Flagged Concerns</div>
          ${CONCERN_FLAGS.map((item,i)=>d.concerns[i]?`<div class="ethics-concern-row"><span style="font-size:14px;">🚩</span><span>${item}</span></div>`:"").join("")}
        </div>`:""}

        <!-- Notes -->
        ${d.overallNotes?`<div class="ethics-section">
          <div class="ethics-section-title">Board Evaluation Notes</div>
          <div class="ethics-notes-box">${esc(d.overallNotes)}</div>
        </div>`:""}

        <!-- Conditions -->
        ${d.conditions?`<div class="ethics-section">
          <div class="ethics-section-title">Required Conditions / Amendments</div>
          <div class="ethics-conditions-box">📋 ${esc(d.conditions)}</div>
        </div>`:""}

        <!-- Study info -->
        ${d.studyType?`<div class="ethics-section">
          <div class="ethics-section-title">Study Information</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;flex:1;min-width:160px;">
              <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Study Design</div>
              <div style="font-size:14px;font-weight:700;color:#0f172a;">${esc(d.studyType)}</div>
            </div>
            ${d.riskLevel?`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;flex:1;min-width:160px;">
              <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Risk Classification</div>
              <div style="font-size:14px;font-weight:700;color:${d.riskLevel.includes("Critical")||d.riskLevel.includes("High")?"#dc2626":d.riskLevel.includes("Moderate")?"#d97706":"#15803d"};">${esc(d.riskLevel)}</div>
            </div>`:""}
          </div>
        </div>`:""}

      </div>

      <!-- Footer -->
      <div class="ethics-footer">
        <div class="ethics-footer-sig">
          <div><strong>National Ethics Review Board</strong> · Republic Research Ethics Oversight System</div>
          <div style="margin-top:2px;">Official document · Report generated ${d.savedAt?esc(d.savedAt):"on record"}</div>
        </div>
        <button class="ethics-close-btn" onclick="S.viewingReport=null;render()">✕ Close Report</button>
      </div>
    </div>
  </div>`;
}

      <p class="about-role-text">The <strong>National Ethics Review Board (NERB)</strong> is an independent body established to oversee the ethical conduct of research involving human participants, sensitive data, and public interests. The Board operates under the principles of respect for persons, beneficence, justice, and scientific integrity.</p>
      <p class="about-role-text">The Committee serves as the final authority in evaluating whether a proposed research study meets the ethical, legal, and procedural standards required for approval. Its decisions are binding and serve the dual purpose of protecting research subjects while enabling legitimate scientific inquiry to flourish.</p>
      <div class="about-note">📌 <strong>Independence Guarantee:</strong> The NERB operates free from institutional pressure or conflict of interest. All board members must declare any affiliations relevant to a case under review.</div>
    </div>
    <div class="about-section">
      <div class="about-section-header"><div class="about-section-icon" style="background:#f0fdf4;">📋</div><div><div class="about-section-title">Responsibilities</div><div class="about-section-sub">Core Duties of the Board</div></div></div>
      <div class="resp-grid">
        <div class="resp-card"><div class="resp-icon">🔍</div><div><div class="resp-title">Ethics Compliance Review</div><div class="resp-desc">Evaluate research proposals for compliance with national ethics standards, informed consent requirements, and data privacy laws.</div></div></div>
        <div class="resp-card"><div class="resp-icon">🏛️</div><div><div class="resp-title">Conduct Formal Hearings</div><div class="resp-desc">Organize and preside over formal hearings where researchers present studies and the board seeks clarifications.</div></div></div>
        <div class="resp-card"><div class="resp-icon">🔬</div><div><div class="resp-title">Formal Case Evaluation</div><div class="resp-desc">Score each submission across ethics, methodology, consent, data security, and benefit-risk criteria using a structured evaluation form.</div></div></div>
        <div class="resp-card"><div class="resp-icon">📝</div><div><div class="resp-title">Issue Official Decisions</div><div class="resp-desc">Render binding decisions backed by documented justifications to maintain transparency and accountability.</div></div></div>
        <div class="resp-card"><div class="resp-icon">🛡️</div><div><div class="resp-title">Protect Research Participants</div><div class="resp-desc">Safeguard the rights, dignity, safety, and welfare of all individuals involved in or affected by studies under review.</div></div></div>
        <div class="resp-card"><div class="resp-icon">⚖️</div><div><div class="resp-title">Adjudicate Appeals</div><div class="resp-desc">Receive, review, and resolve formal appeals from researchers contesting the board's initial decision.</div></div></div>
        <div class="resp-card"><div class="resp-icon">💬</div><div><div class="resp-title">Researcher Communication</div><div class="resp-desc">Receive and respond to written responses from researchers for cases that are rejected, not confirmed, or approved with conditions.</div></div></div>
        <div class="resp-card"><div class="resp-icon">📁</div><div><div class="resp-title">Maintain Official Records</div><div class="resp-desc">Keep auditable records of all case filings, evaluations, decisions, justifications, and appeal proceedings.</div></div></div>
      </div>
    </div>
    <div class="about-section">
      <div class="about-section-header"><div class="about-section-icon" style="background:#fef9c3;">🗺️</div><div><div class="about-section-title">Process of Project Approval</div><div class="about-section-sub">From Filing to Final Decision</div></div></div>
      <div class="process-steps">
        ${steps.map(s=>`<div class="process-step">
          <div class="process-step-left">
            <div class="process-num" style="background:${s.bg};color:${s.color};border-color:${s.border};">${s.num}</div>
            <div class="process-connector" style="background:${s.conn};"></div>
          </div>
          <div class="process-content">
            <div class="process-title">${s.title}${s.badge?`<span class="process-badge" style="background:${s.bg};color:${s.color};border:1px solid ${s.border};">${s.badge}</span>`:""}</div>
            <div class="process-desc">${s.desc}</div>
          </div>
        </div>`).join("")}
      </div>
      <div class="about-note">⏱️ <strong>Timeline Note:</strong> Duration varies depending on study complexity, completeness of submission, and scheduling of hearings.</div>
    </div>
  </div>`;
}

render();
loadFromSheets();
</script>
